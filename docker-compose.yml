services:
  skillyard:
    build:
      context: ./mcp
    ports:
      - "${PORT:-3333}:3333"
    environment:
      PORT: "3333"
      SKILLYARD_DIR: "/skills"
      SKILLYARD_DB_PATH: "/data/skillyard.db"
    volumes:
      - ${SKILLYARD_DIR:-./.agents/skills}:/skills:ro
      - skillyard-db:/data
    restart: unless-stopped

volumes:
  skillyard-db:
